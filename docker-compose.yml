
services:
  mysqldb:
    image: mysql:8.0
    container_name: ecommerce_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ecommerce_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    # Đảm bảo app không chạy cho đến khi db đã sẵn sàng
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Ghi đè cấu hình trong application.yml bằng biến môi trường (Environment Variables)
      # Lưu ý: "mysqldb" ở đây phải trùng với tên service bên trên!
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysqldb:3306/ecommerce_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      mysqldb:
        condition: service_healthy

volumes:
  mysql-data:
